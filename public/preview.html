<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preview – Message Changes</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0e0e16; --surface2: #21213a; --muted: #6868a0;
  --sent-bg: #3b2f8c; --danger: #f56565;
}
body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; padding: 30px 20px; }

h2 { color: #a89dff; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

#messages { display: flex; flex-direction: column; gap: 10px; max-width: 520px; margin: 0 auto; }

.msg { max-width: 68%; display: flex; flex-direction: column; gap: 3px; }
.msg.sent  { align-self: flex-end;  align-items: flex-end; }
.msg.recv  { align-self: flex-start; align-items: flex-start; }

.msg-row { display: flex; align-items: flex-end; gap: 6px; }

/* ✅ NEW: trash always visible, gray, bigger */
.delete-btn {
  opacity: 1;
  background: none; border: none;
  color: #6868a0;        /* gray */
  cursor: pointer;
  font-size: 17px;       /* bigger */
  padding: 4px 5px; border-radius: 4px;
  flex-shrink: 0; line-height: 1;
  transition: color .2s;
}
.delete-btn:hover { color: var(--danger); }

.msg-bubble {
  padding: 9px 14px; border-radius: 16px;
  font-size: 14px; line-height: 1.55; word-break: break-word;
  color: #e2e2f0;
}
.msg.sent .msg-bubble  { background: var(--sent-bg); color: #e8e4ff; border-bottom-right-radius: 4px; }
.msg.recv .msg-bubble  { background: var(--surface2); border-bottom-left-radius: 4px; }

.msg-meta { display: flex; align-items: center; gap: 4px; padding: 0 3px; }
.msg-time { font-size: 10px; color: var(--muted); }

/* ✅ NEW: green for read */
.msg-status       { font-size: 13px; color: var(--muted); letter-spacing: -3px; padding-right: 3px; }
.msg-status.read  { color: #48bb78; }   /* green */

.label {
  text-align: center; font-size: 11px; color: #6868a0;
  margin: 6px 0 2px; letter-spacing: .5px;
}
</style>
</head>
<body>

<h2 style="text-align:center; margin-bottom:24px;">Preview – UI Changes</h2>

<div id="messages">

  <div class="label">SENT — not yet read (grey ✓✓, trash always visible)</div>

  <div class="msg sent">
    <div class="msg-row">
      <button class="delete-btn" title="Delete for everyone">🗑</button>
      <div class="msg-bubble">Hey, how are you?</div>
    </div>
    <div class="msg-meta">
      <span class="msg-time">01:13 AM</span>
      <span class="msg-status">✓✓</span>
    </div>
  </div>

  <div class="label">SENT — read (green ✓✓, trash always visible)</div>

  <div class="msg sent">
    <div class="msg-row">
      <button class="delete-btn" title="Delete for everyone">🗑</button>
      <div class="msg-bubble">This is a read message!</div>
    </div>
    <div class="msg-meta">
      <span class="msg-time">01:15 AM</span>
      <span class="msg-status read">✓✓</span>
    </div>
  </div>

  <div class="label">RECEIVED — no trash icon shown</div>

  <div class="msg recv">
    <div class="msg-bubble">Got it, thanks!</div>
    <div class="msg-time" style="font-size:10px;color:var(--muted);padding:0 3px;">01:16 AM</div>
  </div>

</div>
</body>
</html>
